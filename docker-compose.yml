version: '3.8'

services:
  nacp:
    image: ghcr.io/al90slj23/nacp:main
    container_name: nacp
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: nacp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nacp_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nacp}
      MYSQL_USER: ${MYSQL_USER:-nacp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nacp_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
