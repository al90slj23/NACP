version: '3.8'

# Local development MySQL - data stored in project folder
services:
  mysql-dev:
    image: mysql:8.0
    container_name: nacp-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nacp_dev_root
      MYSQL_DATABASE: nacp_dev
      MYSQL_USER: nacp_dev
      MYSQL_PASSWORD: nacp_dev_pass
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql-dev:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
